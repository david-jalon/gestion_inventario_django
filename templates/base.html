<!DOCTYPE html>
<html lang="es-mx">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestión de Inventario{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-blue-600 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="{% url 'product_list' %}" class="text-xl font-bold">Inventario</a>
            <a href="{% url 'product_create' %}" class="bg-blue-500 hover:bg-blue-400 px-4 py-2 rounded">Nuevo Producto</a>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 py-6">
        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 p-3 rounded {% if message.tags == 'error' %}bg-red-100 text-red-700 border border-red-200{% else %}bg-green-100 text-green-700 border border-green-200{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
