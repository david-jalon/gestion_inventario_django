{% extends 'base.html' %}
{% block title %}{% if product %}Editar{% else %}Nuevo{% endif %} Producto - Gestión de Inventario{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">{% if product %}Editar{% else %}Nuevo{% endif %} Producto</h1>
    <form method="post" class="bg-white rounded shadow p-6 space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label>
            <input type="text" name="name" value="{{ product.name|default:'' }}" required class="w-full border rounded px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
            <textarea name="description" rows="3" class="w-full border rounded px-3 py-2">{{ product.description|default:'' }}</textarea>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Categoría *</label>
            <select name="category" required class="w-full border rounded px-3 py-2">
                <option value="">Selecciona una categoría</option>
                {% for cat in categories %}
                    <option value="{{ cat.id }}" {% if product.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Precio *</label>
            <input type="number" step="0.01" name="price" value="{{ product.price|default:'' }}" required class="w-full border rounded px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Stock</label>
            <input type="number" name="stock" value="{{ product.stock|default:'0' }}" class="w-full border rounded px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Umbral de stock bajo</label>
            <input type="number" name="low_stock_threshold" value="{{ product.low_stock_threshold|default:'5' }}" class="w-full border rounded px-3 py-2">
        </div>
        <div class="flex gap-3 pt-2">
            <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded">Guardar</button>
            <a href="{% url 'product_list' %}" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
