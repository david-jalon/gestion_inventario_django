{% extends 'base.html' %}
{% block title %}Configuración - Gestión de Inventario{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-6">Configuración de la empresa</h1>
    <form method="post" enctype="multipart/form-data" class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 space-y-4">
        {% csrf_token %}

        <div>
            <label for="company_name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Nombre de la empresa</label>
            <input type="text" name="company_name" id="company_name" value="{{ settings.company_name }}" required class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:text-gray-100">
        </div>

        <div>
            <label for="currency_symbol" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Símbolo de moneda</label>
            <input type="text" name="currency_symbol" id="currency_symbol" value="{{ settings.currency_symbol }}" maxlength="10" class="w-20 border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:text-gray-100">
        </div>

        <div>
            <label for="logo" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Logo de la empresa</label>
            {% if settings.logo %}
            <div class="mb-2">
                <img src="{{ settings.logo.url }}" alt="Logo actual" class="h-16 w-auto rounded border border-gray-200 dark:border-gray-700">
            </div>
            {% endif %}
            <input type="file" name="logo" id="logo" accept="image/*" class="w-full text-sm text-gray-600 dark:text-gray-400 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-blue-50 dark:file:bg-blue-900 file:text-blue-700 dark:file:text-blue-300 hover:file:bg-blue-100 dark:hover:file:bg-blue-800">
        </div>

        <div class="flex items-center gap-3 pt-2">
            <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-500 rounded-lg transition-colors shadow-sm">
                Guardar cambios
            </button>
            <a href="{% url 'dashboard' %}" class="px-4 py-2 text-sm font-medium text-gray-600 dark:text-gray-400 hover:text-gray-800 dark:hover:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
