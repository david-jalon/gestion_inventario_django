{% extends 'base.html' %}
{% block title %}Eliminar Producto - Gestión de Inventario{% endblock %}
{% block content %}
<div class="max-w-md mx-auto text-center">
    <div class="bg-white rounded shadow p-6">
        <h1 class="text-xl font-bold text-gray-800 mb-4">¿Eliminar producto?</h1>
        <p class="text-gray-600 mb-6">Estás a punto de eliminar <strong>{{ product.name }}</strong>. Esta acción no se puede deshacer.</p>
        <form method="post" class="flex justify-center gap-3">
            {% csrf_token %}
            <button type="submit" class="bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded">Eliminar</button>
            <a href="{% url 'product_list' %}" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
