{% extends 'base.html' %}
{% block title %}Contraseña Cambiada - Gestión de Inventario{% endblock %}
{% block content %}
<div class="text-center py-12">

        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-green-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
        </svg>

    <h1 class="text-2xl font-bold text-gray-800 mb-2">Contraseña cambiada</h1>
    <p class="text-gray-500 mb-6">Tu contraseña se ha actualizado correctamente.</p>
    <a href="{% url 'dashboard' %}" class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-lg text-sm font-medium transition-colors">
        Volver al inicio
    </a>
</div>
{% endblock %}
